name: Daily Price Check

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 8:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth requests pandas

      - name: Run price checker
        env:
          DUFFEL:             ${{ secrets.DUFFEL }}
          SG:                 ${{ secrets.SG }}
          SENDER:             ${{ secrets.SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          RECIEVER:           ${{ secrets.RECIEVER }}
          GSHEET_CSV_URL:     ${{ secrets.GSHEET_CSV_URL }}
          SPREADSHEET_URL:    ${{ secrets.SPREADSHEET_URL }}
          GSHEETS_CREDS_JSON: ${{ secrets.GSHEETS_CREDS_JSON }}
        run: python checker.py
