name: Daily Price Check

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 8:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth requests pandas

      - name: Run price checker
        env:
          DUFFEL_TOKEN:       ${{ secrets.DUFFEL_TOKEN }}
          SG_CLIENT_ID:       ${{ secrets.SG_CLIENT_ID }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:     ${{ secrets.EMAIL_RECEIVER }}
          GSHEET_CSV_URL:     ${{ secrets.GSHEET_CSV_URL }}
          SPREADSHEET_URL:    ${{ secrets.SPREADSHEET_URL }}
          GSHEETS_CREDS_JSON: ${{ secrets.GSHEETS_CREDS_JSON }}
        run: python checker.py
