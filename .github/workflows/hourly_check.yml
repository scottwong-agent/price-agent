name: Hourly Price Monitor

on:
  schedule:
    # This runs every hour at minute 0 (e.g., 1:00, 2:00, etc.)
    - cron: '0 * * * *'
  workflow_dispatch:
    # This adds a "Run Workflow" button so you can test it manually

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit and Check Prices
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://YOUR-APP-NAME.streamlit.app/
